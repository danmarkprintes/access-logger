<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copa 2026 — Final | Jornada</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-demo-feature="journey">
  <header>
    <h1>Grande final — MetLife Stadium</h1>
    <p>Jornada 3 — último pageview da trilha</p>
  </header>
  <nav id="demo-nav"></nav>
  <main>
    <div class="card">
      <span class="badge">Feature: journey (pageview #4)</span>
      <h2>19 de julho de 2026</h2>
      <p class="muted">Consulte a jornada completa no painel API.</p>
      <p><a class="btn" href="painel-api.html">Ver jornada na API →</a></p>
    </div>
    <pre id="state" class="output"></pre>
  </main>
  <script src="assets/js/demo-config.js"></script>
  <script src="assets/js/demo-nav.js"></script>
  <script src="assets/js/init-logger.js"></script>
  <script>
    document.addEventListener('access-logger-ready', () => {
      const al = window.accessLogger;
      document.getElementById('state').textContent = JSON.stringify({
        session_id: al.sessionId,
        log_id: al.currentLogId,
        navigation_order: al.navigationOrder,
      }, null, 2);
    });
  </script>
</body>
</html>
