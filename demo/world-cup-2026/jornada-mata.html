<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copa 2026 — Mata-mata | Jornada</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-demo-feature="journey">
  <header>
    <h1>Mata-mata</h1>
    <p>Jornada 2 — oitavas, quartas e semifinais</p>
  </header>
  <nav id="demo-nav"></nav>
  <main>
    <div class="card">
      <span class="badge">Feature: journey (pageview #3)</span>
      <h2>Chave eliminatória</h2>
      <p class="muted">32 equipes avançam da fase de grupos.</p>
      <p><a class="btn" href="jornada-final.html">Grande final →</a></p>
    </div>
    <pre id="state" class="output"></pre>
  </main>
  <script src="assets/js/demo-config.js"></script>
  <script src="assets/js/demo-nav.js"></script>
  <script src="assets/js/init-logger.js"></script>
  <script>
    document.addEventListener('access-logger-ready', () => {
      const al = window.accessLogger;
      document.getElementById('state').textContent = JSON.stringify({
        session_id: al.sessionId,
        log_id: al.currentLogId,
        navigation_order: al.navigationOrder,
      }, null, 2);
    });
  </script>
</body>
</html>
