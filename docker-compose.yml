services:
  nginx:
    image: nginx:alpine
    container_name: access-logger-nginx
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      mysql:
        condition: service_healthy
      php:
        condition: service_started

  php:
    build: .
    container_name: access-logger-php
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    environment:
      DB_DSN: mysql:host=mysql;dbname=access_logger;charset=utf8mb4
      DB_USER: root
      DB_PASS: root
      CORS_ORIGINS: "*"
      APP_DEBUG: "0"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: access-logger-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: access_logger
    ports:
      - "3307:3306"
    volumes:
      - access_logger_mysql_data:/var/lib/mysql
      - ./docs/sql/schema_core.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  access_logger_mysql_data:
